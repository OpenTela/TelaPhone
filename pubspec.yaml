name: tela_phone
description: BLE Assistant for FutureClock - двусторонний мост между часами и интернетом

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # BLE
  flutter_blue_plus: ^1.31.0
  permission_handler: ^11.0.0
  
  # Foreground service
  flutter_foreground_task: ^8.17.0
  
  # HTTP
  http: ^1.2.0
  socks5_proxy: ^1.0.4
  
  # WebView для эмулятора
  webview_flutter: ^4.4.0
  webview_flutter_android: ^3.12.0
  
  # Local HTTP server
  shelf: ^1.4.1
  shelf_router: ^1.1.4
  
  # Утилиты
  provider: ^6.1.0
  shared_preferences: ^2.2.0
  path_provider: ^2.1.0
  intl: ^0.18.0
  share_plus: ^7.2.0
  
  # UI
  google_fonts: ^6.1.0
  
  # Voice input
  speech_to_text: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/prompts/
    - assets/server/
    - assets/server/standalone/
